<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Log — Bible Study</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    .streak-row { display: flex; gap: 24px; margin-bottom: 28px; flex-wrap: wrap; }
    .streak-item .num { font-family: var(--font-mono); font-size: 1.8rem; font-weight: 700; color: var(--sage); }
    .streak-item .label { font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-light-dim); }
    .form-panel { background: var(--bone); color: var(--text-dark); border-radius: var(--radius); padding: 20px; margin-bottom: 28px; }
    .form-panel h3 { font-family: var(--font-display); font-size: 1.1rem; font-weight: 600; margin-bottom: 14px; }
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 12px; }
    .entry-list { display: flex; flex-direction: column; gap: 10px; }
    .entry-card {
      background: var(--bone);
      color: var(--text-dark);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid transparent;
      transition: border-color 0.15s ease;
    }
    .entry-card:hover { border-color: var(--line-bone); }
    .entry-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      cursor: pointer;
      gap: 12px;
      user-select: none;
    }
    .entry-header:hover { background: var(--bone-soft); }
    .entry-left { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 0; }
    .entry-title {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .entry-meta {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .entry-date {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dark-dim);
    }
    .entry-passage-tag {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      color: var(--ochre);
    }
    .entry-duration-tag {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      color: var(--text-dark-dim);
      border: 1px solid var(--line-bone);
      border-radius: 2px;
      padding: 1px 6px;
    }
    .entry-chevron {
      font-size: 0.75rem;
      color: var(--text-dark-dim);
      flex-shrink: 0;
      transition: transform 0.2s ease;
    }
    .entry-card.open .entry-chevron { transform: rotate(180deg); }
    .entry-body {
      display: none;
      padding: 0 18px 16px;
      border-top: 1px solid var(--line-bone);
    }
    .entry-card.open .entry-body { display: block; }
    .entry-notes {
      font-size: 0.88rem;
      color: var(--text-dark-dim);
      white-space: pre-wrap;
      line-height: 1.6;
      padding-top: 12px;
    }
    .entry-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 12px;
    }
    .del-btn { background: none; border: none; color: var(--text-dark-dim); cursor: pointer; font-size: 0.82rem; font-family: var(--font-mono); letter-spacing: 0.04em; }
    .del-btn:hover { color: var(--rust); }
    .empty-note { font-size: 0.88rem; color: var(--text-light-dim); font-style: italic; }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="masthead">
      <div>
        <div class="masthead-meta">Personal Field Log</div>
        <h1 class="masthead-title">Bible Study<span>.</span></h1>
      </div>
      <a href="../index.html" class="masthead-date" style="text-decoration:none;">← Back to Today</a>
    </header>
    <nav class="primary-nav">
      <a href="../index.html">Today</a>
      <a href="planner.html">Planner</a>
      <a href="workout-routines.html">Workout Routines</a>
      <a href="gym-log.html">Gym Log</a>
      <a href="bible.html" class="active">Bible Study</a>
      <a href="trading.html">Trading</a>
      <a href="money.html">Money &amp; Credit</a>
      <a href="food.html">Food</a>
      <a href="weekly-review.html">Weekly Review</a>
      <a href="achievements.html">Achievements</a>
      <a href="settings.html">Settings</a>
    </nav>

    <div class="streak-row">
      <div class="streak-item"><div class="num" id="bible-streak">0</div><div class="label">Day streak</div></div>
      <div class="streak-item"><div class="num" id="bible-week-pct">0%</div><div class="label">This week</div></div>
      <div class="streak-item"><div class="num" id="bible-total">0</div><div class="label">Total sessions</div></div>
    </div>

    <div class="form-panel">
      <h3>Log a session</h3>
      <div class="form-row">
        <div class="field-group">
          <label>Date</label>
          <input type="date" class="text-input" id="b-date">
        </div>
        <div class="field-group">
          <label>Title</label>
          <input type="text" class="text-input" id="b-title" placeholder="e.g. Trust in God">
        </div>
        <div class="field-group">
          <label>Passage / Book</label>
          <input type="text" class="text-input" id="b-passage" placeholder="e.g. Proverbs 3, Romans 8">
        </div>
        <div class="field-group">
          <label>Time spent</label>
          <select class="select-input" id="b-duration">
            <option>10 min</option>
            <option>20 min</option>
            <option selected>30 min</option>
            <option>45 min</option>
            <option>1 hour</option>
            <option>1+ hour</option>
          </select>
        </div>
      </div>
      <div class="field-group" style="margin-bottom:14px;">
        <label>Notes / reflection (optional)</label>
        <textarea class="text-input" id="b-notes" rows="3" placeholder="What stood out? What did God show you today?"></textarea>
      </div>
      <button class="btn" id="b-add-btn">+ Log session</button>
    </div>

    <div class="section-label">Study log</div>
    <div class="entry-list" id="b-entry-list">
      <div class="empty-note">Loading...</div>
    </div>

    <div class="footer-note">The Log · A daily field record</div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/api.js"></script>
  <script>
    document.getElementById("b-date").value = todayKey();

    async function renderStats() {
      const entries = await apiGetBible();
      const datesWithStudy = new Set(entries.map(e => e.date));
      let streak = 0;
      let cursor = new Date();
      while (datesWithStudy.has(dateKey(cursor))) {
        streak++;
        cursor.setDate(cursor.getDate() - 1);
      }
      document.getElementById("bible-streak").textContent = streak;
      document.getElementById("bible-total").textContent = entries.length;
      const weekDates = getWeekDates(weekKeyFor(new Date()));
      const doneDays = weekDates.filter(d => datesWithStudy.has(d)).length;
      document.getElementById("bible-week-pct").textContent = Math.round((doneDays / 7) * 100) + "%";
    }

    async function renderEntries() {
      const list = document.getElementById("b-entry-list");
      const entries = await apiGetBible();
      if (entries.length === 0) {
        list.innerHTML = `<div class="empty-note">No sessions logged yet. Start today.</div>`;
        return;
      }
      list.innerHTML = "";
      entries.forEach(e => {
        const card = document.createElement("div");
        card.className = "entry-card";

        const displayTitle = e.title || e.passage || "—";
        const hasNotes = e.notes && e.notes.trim().length > 0;

        card.innerHTML = `
          <div class="entry-header">
            <div class="entry-left">
              <div class="entry-title">${displayTitle}</div>
              <div class="entry-meta">
                <span class="entry-date">${e.date}</span>
                ${e.passage ? `<span class="entry-passage-tag">${e.passage}</span>` : ""}
                <span class="entry-duration-tag">${e.duration}</span>
              </div>
            </div>
            <span class="entry-chevron">▼</span>
          </div>
          <div class="entry-body">
            ${hasNotes ? `<div class="entry-notes">${e.notes}</div>` : `<div class="entry-notes" style="font-style:italic;color:var(--text-dark-dim);">No notes recorded.</div>`}
            <div class="entry-actions">
              <button class="del-btn" data-del="${e.id}">Delete entry</button>
            </div>
          </div>
        `;

        // Toggle collapse
        card.querySelector(".entry-header").addEventListener("click", () => {
          card.classList.toggle("open");
        });

        // Delete
        card.querySelector("[data-del]").addEventListener("click", async (ev) => {
          ev.stopPropagation();
          await apiDeleteBible(e.id);
          renderEntries();
          renderStats();
        });

        list.appendChild(card);
      });
    }

    document.getElementById("b-add-btn").addEventListener("click", async () => {
      const passage = document.getElementById("b-passage").value.trim();
      const title = document.getElementById("b-title").value.trim();
      if (!passage && !title) {
        alert("Please enter at least a passage or title.");
        return;
      }
      const entry = {
        date: document.getElementById("b-date").value || todayKey(),
        title,
        passage,
        duration: document.getElementById("b-duration").value,
        notes: document.getElementById("b-notes").value.trim()
      };
      await apiAddBible(entry);
      setHabit(entry.date, "bible", true);
      document.getElementById("b-title").value = "";
      document.getElementById("b-passage").value = "";
      document.getElementById("b-notes").value = "";
      renderEntries();
      renderStats();
    });

    renderStats();
    renderEntries();
  </script>
</body>
</html>
